# Azure DevOps Pipeline for Team Trip Expense Tracker
# Deploys FastAPI backend to Azure App Service

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - README.md
      - frontend/**
      - DOCKER_DEPLOYMENT.md

variables:
  # Python version
  pythonVersion: '3.12'
  
  # Azure App Service name (update this with your actual App Service name)
  azureAppServiceName: 'expense-tracker-api'
  
  # Azure subscription service connection (configure in Azure DevOps)
  azureSubscription: 'Azure-ServiceConnection'
  
  # Working directory
  workingDirectory: '$(System.DefaultWorkingDirectory)'

stages:
  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: BuildJob
        displayName: 'Build Backend'
        pool:
          vmImage: 'ubuntu-latest'
        
        steps:
          - task: UsePythonVersion@0
            displayName: 'Use Python $(pythonVersion)'
            inputs:
              versionSpec: '$(pythonVersion)'
          
          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: 'Install dependencies'
            workingDirectory: $(workingDirectory)
          
          - script: |
              pip install pytest pytest-cov
              pytest tests/ --junitxml=junit/test-results.xml --cov=app --cov-report=xml --cov-report=html
            displayName: 'Run tests with coverage'
            workingDirectory: $(workingDirectory)
          
          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results.xml'
              failTaskOnFailedTests: true
          
          - task: PublishCodeCoverageResults@2
            displayName: 'Publish code coverage'
            inputs:
              summaryFileLocation: '$(workingDirectory)/coverage.xml'
              pathToSources: '$(workingDirectory)/app'
          
          - task: ArchiveFiles@2
            displayName: 'Archive application files'
            inputs:
              rootFolderOrFile: '$(workingDirectory)'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
              replaceExistingArchive: true
              verbose: true
          
          - task: PublishBuildArtifacts@1
            displayName: 'Publish build artifacts'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'drop'
              publishLocation: 'Container'

  - stage: DeployDev
    displayName: 'Deploy to Development'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployDevJob
        displayName: 'Deploy to Dev App Service'
        environment: 'Development'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@1
                  displayName: 'Download artifacts'
                  inputs:
                    buildType: 'current'
                    downloadType: 'single'
                    artifactName: 'drop'
                    downloadPath: '$(System.ArtifactsDirectory)'
                
                - task: AzureWebApp@1
                  displayName: 'Deploy to Azure App Service (Dev)'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appType: 'webAppLinux'
                    appName: '$(azureAppServiceName)-dev'
                    package: '$(System.ArtifactsDirectory)/drop/*.zip'
                    runtimeStack: 'PYTHON|3.12'
                    startUpCommand: 'python -m uvicorn app.main:app --host 0.0.0.0 --port 8000'

  - stage: DeployProd
    displayName: 'Deploy to Production'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployProdJob
        displayName: 'Deploy to Production App Service'
        environment: 'Production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@1
                  displayName: 'Download artifacts'
                  inputs:
                    buildType: 'current'
                    downloadType: 'single'
                    artifactName: 'drop'
                    downloadPath: '$(System.ArtifactsDirectory)'
                
                - task: AzureWebApp@1
                  displayName: 'Deploy to Azure App Service (Prod)'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appType: 'webAppLinux'
                    appName: '$(azureAppServiceName)'
                    package: '$(System.ArtifactsDirectory)/drop/*.zip'
                    runtimeStack: 'PYTHON|3.12'
                    startUpCommand: 'python -m uvicorn app.main:app --host 0.0.0.0 --port 8000'
                    appSettings: |
                      -DATABASE_URL "sqlite:///./data/expense_tracker.db"
                      -PYTHONUNBUFFERED "1"
